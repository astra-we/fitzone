<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITZONE</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

<header>
  <h1>FITZONE</h1>
</header>

<section class="hero">
  <h2>TRANSFORMA TU CUERPO</h2>
  <p>Gimnasio premium con entrenadores profesionales</p>

  <!-- CAMBIA EL NOMBRE SI TU IMAGEN ES DIFERENTE -->
  <img src="gym.jpg" alt="Gym">

  <div class="botones">
    <button onclick="document.getElementById('planes').scrollIntoView({behavior:'smooth'})">
      Ver Planes
    </button>

    <button onclick="window.open('https://wa.me/549XXXXXXXXXX','_blank')">
      WhatsApp
    </button>
  </div>
</section>

<section id="planes">
  <h2 class="titulo">PLANES</h2>

  <div class="contenedor-planes">

    <div class="plan">
      <h3>Básico</h3>
      <p>$15.000</p>
    </div>

    <div class="plan premium">
      <h3>Premium</h3>
      <p>$25.000</p>
    </div>

    <div class="plan">
      <h3>Elite</h3>
      <p>$40.000</p>
    </div>

  </div>
</section>

<section class="contacto">
  <h2>CONTACTO</h2>

  <button onclick="window.open('https://wa.me/549XXXXXXXXXX','_blank')">
    Hablar por WhatsApp
  </button>
</section>

<script src="script.js"></script>
</body>
</html>
